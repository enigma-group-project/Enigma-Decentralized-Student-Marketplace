name: Deploy Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      ENIG_CREDIT_ADDRESS: ${{ secrets.ENIG_CREDIT_ADDRESS }}
      MARKETPLACE_ADDRESS: ${{ secrets.MARKETPLACE_ADDRESS }}
      REPUTATION_ADDRESS: ${{ secrets.REPUTATION_ADDRESS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "frontend/src"
      - id: deployment
        uses: actions/deploy-pages@v4
